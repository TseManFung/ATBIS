<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ATBIS 登入</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ base_path }}/static/css/site.css" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">帳單系統登入</h1>
        <div id="login-alert"></div>
        <form id="login-form">
          <div class="mb-3">
            <label class="form-label">帳號</label>
            <input type="text" class="form-control" name="username" required title="請輸入帳號" placeholder="請輸入帳號">
          </div>
          <div class="mb-3">
            <label class="form-label">密碼</label>
            <input type="password" class="form-control" name="password" required title="請輸入密碼" placeholder="請輸入密碼">
          </div>
          <button class="btn btn-primary w-100" type="submit">登入</button>
        </form>
      </div>
    </div>
  </div>

  <script src="{{ base_path }}/static/js/app.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const payload = {
        username: formData.get("username"),
        password: formData.get("password"),
      };
      const result = await apiFetch("/api/login", {
        method: "POST",
        body: JSON.stringify(payload),
      });
      if (!result.success) {
        showAlert("login-alert", result.message || "登入失敗", "danger");
        return;
      }
      window.location.href = `${window.ATBIS_BASE}/bills`;
    });
  </script>
</body>
</html>
