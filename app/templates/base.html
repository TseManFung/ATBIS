<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ATBIS{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/bootstrap-table@1.23.5/dist/bootstrap-table.min.css" rel="stylesheet">
  <link href="{{ base_path }}/static/css/site.css" rel="stylesheet">
</head>
<body>
  {% if user %}
  <nav class="navbar navbar-expand-lg bg-light border-bottom mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ base_path }}/bills">ATBIS</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-label="切換選單" title="切換選單">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto"><li class="nav-item"><a class="nav-link" href="{{ base_path }}/bills">查看帳目</a></li><li class="nav-item"><a class="nav-link" href="{{ base_path }}/add-bill">增加帳單</a></li><li class="nav-item"><a class="nav-link" href="{{ base_path }}/groups/new">新建群組</a></li><li class="nav-item"><a class="nav-link" href="{{ base_path }}/groups/manage">群組管理</a></li><li class="nav-item{% if user.is_admin != 1 %} d-none{% endif %}"><a class="nav-link" href="{{ base_path }}/admin/add-user">新增成員</a></li><li class="nav-item"><a class="nav-link" href="{{ base_path }}/profile">個人資料</a></li></ul>
        <span class="me-3">{{ user.display_name or user.username }}</span>
        <button class="btn btn-outline-danger btn-sm" id="logout-btn" type="button">登出</button>
      </div>
    </div>
  </nav>
  {% endif %}

  <main class="container pb-5">
    <div id="global-alert"></div>
    {% block content %}{% endblock %}
  </main>

  <script>
    window.ATBIS_BASE = "{{ base_path }}";
  </script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/bootstrap-table@1.23.5/dist/bootstrap-table.min.js"></script>
  <script src="https://unpkg.com/bootstrap-table@1.23.5/dist/locale/bootstrap-table-zh-TW.min.js"></script>
  <script>
    if (window.jQuery && $.fn.bootstrapTable && $.fn.bootstrapTable.locales["zh-TW"]) {
      $.fn.bootstrapTable.locales["zh-HK"] = $.fn.bootstrapTable.locales["zh-TW"];
    }

    document.addEventListener("DOMContentLoaded", () => {
      const btn = document.getElementById("logout-btn");
      if (!btn) return;

      btn.addEventListener("click", async () => {
        btn.disabled = true;
        try {
          const response = await fetch(`${window.ATBIS_BASE}/api/logout`, {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
          });
          if (!response.ok) {
            window.location.href = `${window.ATBIS_BASE}/logout`;
            return;
          }
          window.location.href = `${window.ATBIS_BASE}`;
        } catch (_err) {
          window.location.href = `${window.ATBIS_BASE}/logout`;
        }
      });
    });
  </script>
  <script src="{{ base_path }}/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
