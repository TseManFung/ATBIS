{% extends "base.html" %}
{% block title %}新建群組{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header">新建群組</div>
      <div class="card-body">
        <form id="new-group-form">
          <div class="mb-3">
            <label class="form-label">群組名稱</label>
            <input name="name" class="form-control" required title="群組名稱" placeholder="請輸入群組名稱">
          </div>
          <button class="btn btn-primary" type="submit">建立群組</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById("new-group-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const result = await apiFetch("/api/groups", {
      method: "POST",
      body: JSON.stringify({ name: form.get("name") }),
    });

    if (!result.success) {
      showAlert("global-alert", result.message || "建立失敗", "danger");
      return;
    }
    showAlert("global-alert", `建立成功：${result.data.name}`, "success");
    e.target.reset();
  });
</script>
{% endblock %}
